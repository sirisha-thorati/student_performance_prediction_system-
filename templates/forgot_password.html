<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
    <style>
     body {
    margin: 0;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url("{{ url_for('static',filename='skill.jpeg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.reset-container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
}

.reset-container h2 {
    margin-bottom: 35px;
}

.reset-container input {
    width: 100%;
    padding: 15px;
    margin:7px 0;
    border-radius: 8px;
    border: 1.5px solid #635858;
}

.reset-container button {
    width:353px;
    padding: 15px;
    margin-top:px;
    background: #4a7cff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.input-box {
    position: relative;
    margin: 15px 0;
}

.input-box i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #555;
}

.input-box input {
    width:300px;
    padding-left:34px;
    border-radius: 8px;
    border:1.4px solid #9f9797;
}
 .btn:hover {
        opacity: 1;
        transform: scale(1.02);
        transition: 0.9;
    }
    </style>
</head>
<body>

<div class="reset-container">
    <h2>Reset Password</h2>

    <form method="POST">

        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" name="username"
                   placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input type="password"
             name="password"
             id="password"
             placeholder="Enter New Password" 
             required>
                                         
        </div>

        <button class="btn"
        type="submit">Update Password</button>

    </form>
</div>
</body>
</html>
